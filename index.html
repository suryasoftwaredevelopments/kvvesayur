<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cache ഒഴിവാക്കാനുള്ള മെറ്റാ ടാഗുകൾ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>KVVES Ayur Unit Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c5364; font-family: sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .logo-container { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 4px solid #f39c12; }
        .login-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 25px; width: 350px; text-align: center; margin-bottom: 30px; }
        .search-card { background: rgba(255, 255, 255, 0.95); color: #333; border-radius: 10px; padding: 25px; width: 90%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <!-- Logo -->
    <div class="logo-container">
        <img src="https://i.ibb.co/8LQdBdqh/logo.png" style="width: 80%;">
    </div>
    <h4 class="mb-4 text-warning fw-bold">KERALA VYAPARI VYAVASAYI EKOPANA SAMIDHI - AYUR UNIT</h4>

    <!-- Login -->
    <div class="login-card">
        <h5 class="mb-3">🔑 System Login</h5>
        <input type="text" id="usernameField" class="form-control mb-2" placeholder="Username">
        <input type="password" id="passwordField" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-warning w-100 fw-bold" onclick="handlePortalLogin()">Secure Sign In</button>
    </div>

    <!-- Search -->
    <div class="search-card">
        <h5 class="fw-bold mb-3 text-primary">📖 Ayur Unit Public Business Directory</h5>
        <div class="row g-2">
            <div class="col-md-5"><input type="text" id="publicSearchField" class="form-control" placeholder="Search Shop/Landmark..."></div>
            <div class="col-md-4"><select id="publicCategoryFilter" class="form-select"><option value="">All Categories</option></select></div>
            <div class="col-md-3"><button class="btn btn-warning w-100" onclick="handlePublicSearchTrigger()">🔍 Find</button></div>
        </div>
        <div id="publicCardsGrid" class="mt-3"></div>
    </div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbylBJ4tjAPDpfjF8bocr_Mgke6DQU_snei2IbIG4Lta1-Trfz3Vo_HiZAoiWxCiOExxNg/exec";

    function handlePortalLogin() {
        const u = document.getElementById('usernameField').value;
        const p = document.getElementById('passwordField').value;
        if(u === "admin" && p === "ayur123") {
            alert("Login Success!");
            // ഇവിടെ അഡ്മിൻ പാനലിലേക്ക് മാറ്റുന്ന കോഡ് ചേർക്കാം
        } else { alert("Invalid Credentials!"); }
    }
    
    function handlePublicSearchTrigger() {
        alert("Searching...");
    }
</script>
</body>
</html>
