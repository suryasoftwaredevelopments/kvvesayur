<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>KVVES Ayur Unit Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c5364; font-family: sans-serif; color: white; min-height: 100vh; }
        .logo-container { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto; border: 4px solid #f39c12; }
        .login-card, .search-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 25px; width: 90%; max-width: 400px; margin: 0 auto 20px auto; text-align: center; }
        .search-card { background: rgba(255, 255, 255, 0.95); color: #333; max-width: 800px; }
        #adminDashboard { padding: 20px; }
    </style>
</head>
<body>

    <div id="mainScreen">
        <div class="logo-container"><img src="https://i.ibb.co/8LQdBdqh/logo.png" style="width: 80%;"></div>
        <h4 class="text-center mb-4 text-warning fw-bold">KERALA VYAPARI VYAVASAYI EKOPANA SAMIDHI - AYUR UNIT</h4>

        <div class="login-card">
            <h5 class="mb-3">🔑 System Login</h5>
            <input type="text" id="usernameField" class="form-control mb-2" placeholder="Username">
            <input type="password" id="passwordField" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-warning w-100 fw-bold" onclick="handlePortalLogin()">Secure Sign In</button>
        </div>

        <div class="search-card">
            <h5 class="fw-bold mb-3 text-primary">📖 Public Business Directory</h5>
            <div class="row g-2">
                <div class="col-md-9"><input type="text" id="publicSearchField" class="form-control" placeholder="Search Shop/Landmark..."></div>
                <div class="col-md-3"><button class="btn btn-warning w-100" onclick="alert('Searching...')">🔍 Find</button></div>
            </div>
            <div id="publicCardsGrid" class="mt-3"></div>
        </div>
    </div>

    <div id="adminDashboard" class="container mt-5 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Admin Panel</h2>
            <button class="btn btn-danger" onclick="location.reload()">Logout</button>
        </div>
        <table class="table table-bordered table-light">
            <thead>
                <tr><th>ID</th><th>Name</th><th>Total Paid</th><th>Actions</th></tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbylBJ4tjAPDpfjF8bocr_Mgke6DQU_snei2IbIG4Lta1-Trfz3Vo_HiZAoiWxCiOExxNg/exec";

    // ലോഗിൻ ലോജിക്
    function handlePortalLogin() {
        const u = document.getElementById('usernameField').value;
        const p = document.getElementById('passwordField').value;
        if(u === "admin" && p === "ayur123") {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('d-none');
            loadAdminData();
        } else { alert("Invalid Credentials!"); }
    }

    // അഡ്മിൻ ഡാറ്റ ലോഡ് ചെയ്യാനും ബട്ടണുകൾ കാണിക്കാനും
    async function loadAdminData() {
        try {
            const response = await fetch(CLOUD_API_URL, { method: "POST", body: JSON.stringify({ action: "read" }) });
            const data = await response.json();
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            data.members.forEach(m => {
                tbody.innerHTML += `<tr>
                    <td>${m.id}</td><td>${m.name}</td><td>${m.totalpaid || 0}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="alert('Edit ${m.id}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteMember('${m.id}')">Purge</button>
                    </td>
                </tr>`;
            });
        } catch(e) { alert("Error loading data!"); }
    }

    // Purge ഫങ്ഷൻ
    async function deleteMember(id) {
        if(!confirm("Are you sure you want to PURGE this member?")) return;
        await fetch(CLOUD_API_URL, { method: "POST", body: JSON.stringify({ action: "delete", type: "member", id: id }) });
        alert("Deleted successfully!");
        loadAdminData();
    }
</script>
</body>
</html>
