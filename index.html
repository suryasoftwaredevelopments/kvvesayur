<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>KVVES Ayur Unit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c5364; font-family: sans-serif; color: white; margin: 0; padding: 20px; text-align: center; }
        .welcome-screen { max-width: 800px; margin: 0 auto; }
        .logo-container { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto; border: 4px solid #f39c12; }
        .login-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 25px; width: 100%; max-width: 400px; margin: 20px auto; }
        .public-directory-container { background: rgba(255, 255, 255, 0.95); color: #333; border-radius: 10px; padding: 25px; width: 100%; max-width: 800px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: left; }
    </style>
</head>
<body>

<div class="welcome-screen" id="welcomeScreen">
    <div class="logo-container"><img src="https://i.ibb.co/8LQdBdqh/logo.png" style="width: 80%;"></div>
    <h4 class="mb-4 text-warning fw-bold">KERALA VYAPARI VYAVASAYI EKOPANA SAMIDHI - AYUR UNIT</h4>

    <div class="login-card">
        <h5 class="mb-3">🔑 System Login</h5>
        <input type="text" id="usernameField" class="form-control mb-2" placeholder="Username">
        <input type="password" id="passwordField" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-warning w-100 fw-bold" onclick="handlePortalLogin()">Secure Sign In</button>
    </div>

    <div class="public-directory-container">
        <h5 class="fw-bold mb-3 text-primary">📖 Ayur Unit Public Business Directory</h5>
        <div class="row g-2">
            <div class="col-md-9"><input type="text" id="publicSearchField" class="form-control" placeholder="Search..."></div>
            <div class="col-md-3"><button class="btn btn-warning w-100" onclick="alert('Searching...')">🔍 Find</button></div>
        </div>
    </div>
</div>

<div id="adminDashboard" class="container mt-5 d-none">
    <h2>Admin Panel</h2>
    <button class="btn btn-danger" onclick="location.reload()">Logout</button>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwHP3ck8DxFaR02xNrahH_pCOgNx00JWub0KFgtDcZ6riUtzg8qJrOXzC7bS6uZvLiG/exec";

    function handlePortalLogin() {
        const u = document.getElementById('usernameField').value.trim();
        const p = document.getElementById('passwordField').value.trim();
        if(u === "admin" && p === "ayur123") {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('d-none');
        } else {
            alert("Invalid Credentials!");
        }
    }
</script>
</body>
</html>
