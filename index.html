<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVVES Ayur Unit Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; }
        .welcome-screen { min-height: 100vh; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 20px; }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 30px; width: 100%; max-width: 400px; margin-bottom: 30px; }
        .public-directory-container { width: 100%; max-width: 800px; background: rgba(255,255,255,0.95); color: #333; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .cloud-spinner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); z-index: 10000; justify-content: center; align-items: center; font-weight: bold; color: #0f2027; }
    </style>
</head>
<body>

<div class="cloud-spinner" id="loadingOverlay"><div class="spinner-border text-warning me-2"></div> Connecting...</div>

<!-- Entry Screen -->
<div class="welcome-screen" id="welcomeScreen">
    <div class="login-card text-center">
        <h5 class="fw-bold mb-3 text-warning">🔑 System Login</h5>
        <input type="text" id="usernameField" class="form-control bg-dark text-white border-secondary mb-2" placeholder="Username">
        <input type="password" id="passwordField" class="form-control bg-dark text-white border-secondary mb-3" placeholder="Password">
        <button class="btn btn-warning w-100 fw-bold" onclick="handlePortalLogin()">Secure Sign In</button>
    </div>

    <!-- Search Section -->
    <div class="public-directory-container">
        <h5 class="fw-bold mb-3 text-primary">📖 Public Business Directory</h5>
        <div class="row g-2">
            <div class="col-md-8"><input type="text" id="publicSearchField" class="form-control" placeholder="Search..."></div>
            <div class="col-md-4"><button class="btn btn-warning w-100" onclick="handlePublicSearchTrigger()">Search</button></div>
        </div>
        <div id="publicCardsGrid" class="mt-3"></div>
    </div>
</div>

<!-- Dashboard (Admin) -->
<div class="container-fluid py-4 d-none" id="adminDashboard">
    <button class="btn btn-danger" onclick="location.reload()">Exit</button>
    <h2>Admin Dashboard</h2>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbylBJ4tjAPDpfjF8bocr_Mgke6DQU_snei2IbIG4Lta1-Trfz3Vo_HiZAoiWxCiOExxNg/exec"; 

    function loader(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

    async function handlePortalLogin() {
        const u = document.getElementById('usernameField').value;
        const p = document.getElementById('passwordField').value;
        if(u === "admin" && p === "ayur123") {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('d-none');
        } else { alert("Invalid!"); }
    }

    async function handlePublicSearchTrigger() {
        loader(true);
        try {
            let res = await fetch(CLOUD_API_URL, { method: "POST", body: JSON.stringify({ action: "read" }) });
            let data = await res.json();
            document.getElementById('publicCardsGrid').innerHTML = "Search results loaded!"; // ഇവിടെ ഡാറ്റ കാണിക്കുക
        } catch(e) { alert("Error!"); }
        loader(false);
    }
</script>
</body>
</html>
