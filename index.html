<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- കാഷെ പ്രശ്നം ഒഴിവാക്കാൻ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>KVVES Ayur Unit Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #2c5364; font-family: sans-serif; color: white; min-height: 100vh; }
        .logo-container { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto; border: 4px solid #f39c12; }
        .login-card, .search-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 25px; width: 90%; max-width: 400px; margin: 0 auto 20px auto; text-align: center; }
        .search-card { background: rgba(255, 255, 255, 0.95); color: #333; max-width: 800px; }
        #adminDashboard { padding: 20px; background-color: #f4f6f9; color: #333; }
    </style>
</head>
<body>

    <!-- Main Entry Screen -->
    <div id="mainScreen">
        <div class="logo-container"><img src="https://i.ibb.co/8LQdBdqh/logo.png" style="width: 80%;"></div>
        <h4 class="text-center mb-4 text-warning fw-bold">KERALA VYAPARI VYAVASAYI EKOPANA SAMIDHI - AYUR UNIT</h4>

        <div class="login-card">
            <h5 class="mb-3 text-white">🔑 System Login</h5>
            <input type="text" id="usernameField" class="form-control mb-2" placeholder="Username">
            <input type="password" id="passwordField" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-warning w-100 fw-bold" onclick="handlePortalLogin()">Secure Sign In</button>
        </div>
    </div>

    <!-- Admin Panel (Initially Hidden) -->
    <div id="adminDashboard" class="container mt-5 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Admin Panel</h2>
            <button class="btn btn-danger" onclick="location.reload()">Logout</button>
        </div>
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr><th>ID</th><th>Name</th><th>Total Paid</th><th>Actions</th></tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>

<script>
    // പുതിയ URL ചേർത്തു
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwHP3ck8DxFaR02xNrahH_pCOgNx00JWub0KFgtDcZ6riUtzg8qJrOXzC7bS6uZvLiG/exec";

    // ലോഗിൻ ലോജിക്
    async function handlePortalLogin() {
        const u = document.getElementById('usernameField').value.trim();
        const p = document.getElementById('passwordField').value.trim();
        
        if(u === "admin" && p === "ayur123") {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('d-none');
            loadAdminData();
        } else { alert("Invalid Credentials!"); }
    }

    // CORS പ്രശ്നം ഒഴിവാക്കി ഡാറ്റ ഫെച്ച് ചെയ്യുന്ന രീതി
    async function loadAdminData() {
        try {
            // കാഷെ ഒഴിവാക്കാൻ ലിങ്കിന്റെ ഒപ്പം ഒരു റാൻഡം നമ്പർ ചേർക്കുന്നു
            const response = await fetch(CLOUD_API_URL + "?v=" + Math.random(), { 
                method: "POST", 
                mode: "no-cors", // ഡാറ്റ കിട്ടിയില്ലെങ്കിൽ 'cors' ആക്കി മാറ്റുക
                body: JSON.stringify({ action: "read" }) 
            });
            
            // കോഡ് ശരിയാണോ എന്ന് പരിശോധിക്കാൻ
            alert("Data fetching started. Check Console (F12) for details.");
            
        } catch(e) { 
            console.error(e);
            alert("Error loading data! F12 അമർത്തി കൺസോൾ പരിശോധിക്കുക."); 
        }
    }
</script>
</body>
</html>
