<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>KVVES Ayur Unit Accounts, Expense & Directory Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; user-select: none; }
        .welcome-screen { min-height: 100vh; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 20px 0; }
        .emblem-container { width: 110px; height: 110px; border: 4px solid #f39c12; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; background: white; }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 20px; width: 320px; margin-bottom: 25px; text-align: center; }
        .public-directory-container { width: 90%; max-width: 800px; background: rgba(255,255,255,0.95); color: #333; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .cloud-spinner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); z-index: 10000; justify-content: center; align-items: center; font-weight: bold; color: #0f2027; }
    </style>
</head>
<body>

    <script>
        if (!window.location.hash) {
            window.location = window.location + '#loaded';
            window.location.reload();
        }
    </script>

    <div class="cloud-spinner" id="loadingOverlay"><div class="spinner-border text-warning me-2"></div> Connecting...</div>

    <div class="welcome-screen" id="welcomeScreen">
        <div class="emblem-container">
            <img src="https://i.ibb.co/8LQdBdqh/logo.png" style="width: 85%; height: 85%; object-fit: contain;">
        </div>
        
        <div class="login-card">
            <h5 class="fw-bold mb-3 text-warning">🔑 System Login</h5>
            <input type="text" id="usernameField" class="form-control mb-2" placeholder="Username">
            <input type="password" id="passwordField" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-warning w-100 fw-bold" onclick="handlePortalLogin()">Secure Sign In</button>
        </div>

        <div class="public-directory-container">
            <h5 class="fw-bold mb-3 text-primary">📖 Public Business Directory</h5>
            <div class="row g-2">
                <div class="col-md-9"><input type="text" id="publicSearchField" class="form-control" placeholder="Search Shop/Landmark..."></div>
                <div class="col-md-3"><button class="btn btn-warning w-100" onclick="alert('Searching...')">🔍 Find</button></div>
            </div>
        </div>
    </div>

    <div class="container-fluid px-4 py-4 d-none" id="adminDashboard">
        <h2>Admin Panel</h2>
        <button class="btn btn-danger" onclick="location.reload()">Logout</button>
    </div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwHP3ck8DxFaR02xNrahH_pCOgNx00JWub0KFgtDcZ6riUtzg8qJrOXzC7bS6uZvLiG/exec";

    async function handlePortalLogin() {
        const u = document.getElementById('usernameField').value.trim();
        const p = document.getElementById('passwordField').value.trim();
        
        if(u === "admin" && p === "ayur123") {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('d-none');
        } else {
            alert("Invalid Credentials!");
        }
    }
</script>
</body>
</html>
