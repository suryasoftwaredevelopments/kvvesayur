<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cache ഒഴിവാക്കാനുള്ള മെറ്റാ ടാഗുകൾ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>KVVES Ayur Unit Accounts, Expense & Directory Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; user-select: none; }
        .welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; overflow-y: auto; padding: 20px 0; }
        .emblem-container { width: 110px; height: 110px; border: 4px solid #f39c12; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; box-shadow: 0 0 20px rgba(243, 156, 18, 0.5); overflow: hidden; background: white; }
        .marquee-wrapper { width: 100%; background: rgba(0, 0, 0, 0.4); padding: 10px 0; border-top: 2px solid rgba(255,255,255,0.1); border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 15px; white-space: nowrap; }
        .scrolling-text-left { display: inline-block; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; animation: scrollLeft 15s linear infinite; color: #f39c12; }
        @keyframes scrollLeft { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 20px; width: 320px; margin-bottom: 25px; }
        .public-directory-container { width: 90%; max-width: 950px; background: rgba(255,255,255,0.95); color: #333; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .cloud-spinner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); z-index: 10000; justify-content: center; align-items: center; font-weight: bold; color: #0f2027; }
    </style>
</head>
<body>

    <!-- ഓട്ടോമാറ്റിക് റീഫ്രഷ് സ്ക്രിപ്റ്റ് -->
    <script>
        if (!window.location.hash) {
            window.location = window.location + '#loaded';
            window.location.reload();
        }
    </script>

    <div class="cloud-spinner" id="loadingOverlay"><div class="spinner-border text-warning me-2"></div> Connecting Cloud Database...</div>

    <div class="welcome-screen" id="welcomeScreen">
        <div class="emblem-container">
            <img src="https://i.ibb.co/8LQdBdqh/logo.png" alt="KVVES" style="width: 85%; height: 85%; object-fit: contain;">
        </div>
        <div class="marquee-wrapper">
            <div class="scrolling-text-left">Kerala Vyapari Vyavasayi Ekopana Samidhi - Ayur Unit</div>
        </div>
        
        <div class="login-card text-center">
            <h5 class="fw-bold mb-3 text-warning">🔑 System Login</h5>
            <input type="text" id="usernameField" class="form-control bg-dark text-white border-secondary mb-2" placeholder="Username/ID">
            <input type="password" id="passwordField" class="form-control bg-dark text-white border-secondary mb-3" placeholder="Password">
            <button class="btn btn-warning w-100 fw-bold" onclick="handlePortalLogin()">Secure Sign In</button>
        </div>

        <div class="public-directory-container">
            <h5 class="fw-bold mb-3 text-primary">📖 Ayur Unit Public Business Directory (പൊതു ഡയറക്ടറി)</h5>
            <div class="row g-2">
                <div class="col-md-9"><input type="text" id="publicSearchField" class="form-control" placeholder="Search..."></div>
                <div class="col-md-3"><button class="btn btn-warning w-100" onclick="alert('Searching...')">🔍 Find</button></div>
            </div>
        </div>
    </div>

    <!-- Admin Panel (Initially Hidden) -->
    <div class="container-fluid px-4 py-4 d-none" id="adminDashboard">
        <h2 class="text-dark">Admin Panel</h2>
        <button class="btn btn-danger" onclick="location.reload()">Exit</button>
    </div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwHP3ck8DxFaR02xNrahH_pCOgNx00JWub0KFgtDcZ6riUtzg8qJrOXzC7bS6uZvLiG/exec";

    function loader(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

    // ഡാറ്റ ഫെച്ച് ചെയ്യുമ്പോൾ പുതിയ സമയം (timestamp) അയക്കുന്നു
    async function cloudFetch(payload) {
        payload.t = new Date().getTime(); 
        try {
            let res = await fetch(CLOUD_API_URL, { method: "POST", body: JSON.stringify(payload) });
            return await res.json();
        } catch(e) { alert("Cloud connection failed."); return null; }
    }

    async function handlePortalLogin() {
        const u = document.getElementById('usernameField').value.trim();
        const p = document.getElementById('passwordField').value.trim();
        
        if(u === "admin" && p === "ayur123") {
            loader(true);
            let data = await cloudFetch({ action: "read" });
            loader(false);
            
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('d-none');
        } else {
            alert("Invalid Credentials!");
        }
    }
</script>
</body>
</html>
